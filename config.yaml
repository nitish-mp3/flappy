---
name: Flappy
slug: flappy
description: >
  KNX/IP failover proxy with instant hot-failover,
  KNX IP Secure tunneling, USB via knxd, and configurable failback.
  Supports TCP, UDP, and USB interfaces in any combination.
version: "4.1.2"
homeassistant: "2024.1.0"
arch:
  - aarch64
  - amd64
startup: services
boot: auto

# ─── Network ──────────────────────────────────────────────────────────
ports:
  3671/tcp: 3671
  3671/udp: 3671

# ─── Defaults ─────────────────────────────────────────────────────────
options:
  # Frontend (what HA connects to)
  frontend_protocol: udp
  listen_port: 3671

  # Primary interface
  primary_host: ""
  primary_port: 3671
  primary_protocol: tcp
  primary_secure: false
  primary_device_password: ""
  primary_user_password: ""



  # USB interface (local knxd or native)
  usb_device: ""
  usb_baud: 19200
  usb_priority: last_resort
  usb_mode: auto
  usb_knxd_extra_args: ""

  # External knxd addon (third failover tier)
  knxd_host: ""
  knxd_port: 3671
  knxd_protocol: udp

  # Health checking
  health_check_interval: 5
  health_check_fall: 3
  health_check_rise: 2
  health_check_method: probe
  connection_timeout: 5

  # Failover / failback
  failback_mode: auto
  failback_delay_seconds: 30

  # Sessions
  max_sessions: 8
  session_timeout: 120
  drain_timeout_seconds: 5

  # Logging & notifications
  log_level: info
  notify_on_failover: false

# ─── Schema ───────────────────────────────────────────────────────────
schema:
  # Frontend
  frontend_protocol: list(udp|tcp|both)?
  listen_port: port

  # Primary
  primary_host: str?
  primary_port: port?
  primary_protocol: list(tcp|udp|auto)?
  primary_secure: bool?
  primary_device_password: password?
  primary_user_password: password?

  # Backup
  backup_host: str?
  backup_port: port?
  backup_protocol: list(tcp|udp|auto)?
  backup_secure: bool?
  backup_device_password: password?
  backup_user_password: password?

  # USB
  usb_device: str?
  usb_baud: int(1200,)?
  usb_priority: list(last_resort|prefer)?
  usb_mode: list(auto|knxd|native|socat)?
  usb_knxd_extra_args: str?

  # External knxd
  knxd_host: str?
  knxd_port: port?
  knxd_protocol: list(tcp|udp)?

  # Health
  health_check_interval: int(1,)?
  health_check_fall: int(1,)?
  health_check_rise: int(1,)?
  health_check_method: list(probe|heartbeat|both)?
  connection_timeout: int(1,)?

  # Failover
  failback_mode: list(auto|manual|disabled)?
  failback_delay_seconds: int(10,)?

  # Sessions
  max_sessions: int(1,16)?
  session_timeout: int(30,)?
  drain_timeout_seconds: int(1,30)?

  # Logging
  log_level: list(debug|info|warning|error)?
  notify_on_failover: bool?

# ─── Permissions ──────────────────────────────────────────────────────
privileged: []
uart: true
udev: true
usb: true
access_token: false
devices: []
realtime: false
init: false
services: []