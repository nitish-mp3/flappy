---
name: KNX Failover Proxy
slug: knx_haproxy
description: >
  KNX/IP failover proxy with automatic backend failover.
  UDP is the recommended Home Assistant frontend; TCP can be enabled
  explicitly for best-effort compatibility.
version: "2.7.0"
homeassistant: "2024.1.0"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto

ports:
  3671/tcp: 3671
  3671/udp: 3671
  3672/tcp: 3672
  3672/udp: 3672

options:
  frontend_protocol: udp
  primary_host: ""
  primary_port: 3671
  primary_protocol: tcp
  backup_host: ""
  backup_port: 3671
  backup_protocol: udp
  usb_device: ""
  usb_baud: 19200
  usb_priority: last_resort
  listen_port: 3671
  log_level: info
  connection_timeout: 5
  prefer_protocol: tcp
  health_check_interval: 5
  health_check_fall: 3
  health_check_rise: 2
  primary_recovery_hold_seconds: 600
  client_tunnels: 4
  notify_on_failover: false

schema:
  frontend_protocol: list(udp|tcp|both)?
  primary_host: str
  primary_port: port
  primary_protocol: list(tcp|udp|auto)?
  backup_host: str
  backup_port: port
  backup_protocol: list(tcp|udp|auto)?
  usb_device: str?
  usb_baud: int(1200,)?
  usb_priority: list(last_resort|prefer)?
  listen_port: port
  log_level: list(debug|info|warning|error)?
  connection_timeout: int(1,)?
  prefer_protocol: list(tcp|udp|auto)?
  health_check_interval: int(1,)?
  health_check_fall: int(1,)?
  health_check_rise: int(1,)?
  primary_recovery_hold_seconds: int(1,)?
  client_tunnels: int(1,8)?
  notify_on_failover: bool?

privileged: []
uart: true
udev: true
access_token: false
devices: []
realtime: false
init: false
services: []