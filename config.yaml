---
name: KNX Failover Proxy
slug: knx_haproxy
description: >
  KNX/IP active-passive failover proxy. Supports TCP/IP, UDP/IP (auto-bridged),
  and USB/serial interfaces with automatic failover and recovery.
version: "2.2.2"
homeassistant: "2024.1.0"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto

# Both TCP and UDP must be published on the listen port.
# TCP  — carries the actual KNX tunneling traffic via HAProxy
# UDP  — answers xknx DESCRIPTION_REQUEST so HA can discover the proxy
ports:
  3672/tcp: 3672
  3672/udp: 3672

options:
  primary_host: ""
  primary_port: 3671
  backup_host: ""
  backup_port: 3671
  usb_device: ""
  usb_baud: 19200
  usb_priority: last_resort
  udp_bridge_port: 13671
  listen_port: 3672
  log_level: info
  connection_timeout: 5
  client_timeout: 300
  server_timeout: 300
  health_check_interval: 5
  health_check_fall: 3
  health_check_rise: 2
  notify_on_failover: false

schema:
  primary_host: str
  primary_port: port
  backup_host: str
  backup_port: port
  usb_device: str?
  usb_baud: int(1200,)?
  usb_priority: list(last_resort|prefer)?
  udp_bridge_port: port?
  listen_port: port
  log_level: list(debug|info|warning|error)?
  connection_timeout: int(1,)?
  client_timeout: int(1,)?
  server_timeout: int(1,)?
  health_check_interval: int(1,)?
  health_check_fall: int(1,)?
  health_check_rise: int(1,)?
  notify_on_failover: bool?

privileged: []
uart: true
udev: true
access_token: false
devices: []
realtime: false
init: false
services: []